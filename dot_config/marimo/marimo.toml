[save]
autosave = "after_delay"
format_on_save = false
autosave_delay = 1000

[completion]
copilot = false
activate_on_typing = true

[server]
browser = "default"
follow_symlink = false

[display]
default_width = "medium"
cell_output = "below"
dataframes = "rich"
theme = "dark"
code_editor_font_size = 12
default_table_page_size = 10

[formatting]
line_length = 94

[experimental]

[language_servers.pylsp]
enable_mypy = false
enable_flake8 = false
enable_pydocstyle = false
enable_pylint = false
enable_pyflakes = false
enable_ruff = false
enabled = false

[ai]
rules = ""
[ai.google]

[ai.open_ai]

[ai.anthropic]

[runtime]
auto_reload = "lazy"
std_stream_max_bytes = 1000000
watcher_on_save = "lazy"
output_max_bytes = 8000000
auto_instantiate = false
reactive_tests = false
on_cell_change = "autorun"

[diagnostics]
enabled = false

[keymap]
preset = "vim"
[keymap.overrides]

[package_management]
manager = "uv"

[snippets]
include_default_snippets = true
custom_paths = []
