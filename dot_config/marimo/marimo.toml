[package_management]
manager = "uv"

[diagnostics]
enabled = false

[language_servers.pylsp]
enable_flake8 = false
enable_pyflakes = false
enabled = false
enable_pydocstyle = false
enable_ruff = false
enable_pylint = false
enable_mypy = false

[formatting]
line_length = 80

[completion]
copilot = false
activate_on_typing = true

[snippets]
include_default_snippets = true
custom_paths = []

[server]
follow_symlink = false
browser = "default"

[display]
theme = "light"
cell_output = "below"
default_width = "medium"
code_editor_font_size = 12
default_table_page_size = 10
dataframes = "rich"

[ai]
rules = ""

[ai.open_ai]

[ai.google]

[ai.anthropic]

[save]
autosave = "off"
format_on_save = false
autosave_delay = 1000

[runtime]
on_cell_change = "autorun"
std_stream_max_bytes = 1000000
reactive_tests = false
output_max_bytes = 8000000
watcher_on_save = "lazy"
auto_reload = "autorun"
default_sql_output = "auto"
auto_instantiate = false

[keymap]
preset = "vim"

[keymap.overrides]
