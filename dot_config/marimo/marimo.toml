[diagnostics]
enabled = false

[runtime]
output_max_bytes = 8000000
auto_instantiate = false
std_stream_max_bytes = 1000000
watcher_on_save = "autorun"
on_cell_change = "autorun"
auto_reload = "autorun"
reactive_tests = true

[experimental]

[server]
browser = "default"
follow_symlink = false

[completion]
copilot = false
activate_on_typing = true

[ai]
rules = ""
[ai.open_ai]

[ai.anthropic]

[ai.google]

[package_management]
manager = "uv"

[keymap]
preset = "vim"

[formatting]
line_length = 90

[save]
format_on_save = true
autosave = "on"
autosave_delay = 1000

[snippets]
include_default_snippets = true
custom_paths = []

[language_servers.pylsp]
enable_flake8 = false
enable_ruff = true
enabled = false
enable_mypy = false
enable_pydocstyle = false
enable_pylint = false
enable_pyflakes = false

[display]
cell_output = "below"
code_editor_font_size = 12
default_table_page_size = 10
theme = "dark"
default_width = "medium"
dataframes = "rich"
