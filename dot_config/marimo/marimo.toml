[formatting]
line_length = 90

[experimental]
lsp = false

[server]
browser = "default"
follow_symlink = false

[completion]
activate_on_typing = true
copilot = false

[diagnostics]
enabled = false

[ai]
rules = ""
[ai.open_ai]

[ai.anthropic]

[ai.google]

[display]
theme = "system"
default_width = "medium"
default_table_page_size = 10
code_editor_font_size = 14
cell_output = "below"
dataframes = "rich"

[keymap]
preset = "vim"
[keymap.overrides]

[snippets]
include_default_snippets = true
custom_paths = []

[save]
autosave = "after_delay"
format_on_save = true
autosave_delay = 1000

[runtime]
auto_instantiate = false
auto_reload = "lazy"
output_max_bytes = 8000000
reactive_tests = true
on_cell_change = "lazy"
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000

[package_management]
manager = "uv"

[language_servers.pylsp]
enable_pydocstyle = false
enabled = false
enable_ruff = true
enable_mypy = true
enable_pylint = false
enable_flake8 = false
enable_pyflakes = false
