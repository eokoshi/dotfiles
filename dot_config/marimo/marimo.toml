[runtime]
auto_instantiate = false
reactive_tests = true
output_max_bytes = 8000000
std_stream_max_bytes = 1000000
auto_reload = "autorun"
on_cell_change = "autorun"
watcher_on_save = "lazy"

[save]
format_on_save = false
autosave = "on"
autosave_delay = 1000

[snippets]
include_default_snippets = true
custom_paths = []

[server]
follow_symlink = false
browser = "default"

[display]
default_table_page_size = 10
code_editor_font_size = 12
cell_output = "below"
dataframes = "rich"
theme = "system"
default_width = "medium"

[formatting]
line_length = 90

[package_management]
manager = "uv"

[language_servers.pylsp]
enabled = false
enable_pydocstyle = false
enable_flake8 = false
enable_mypy = true
enable_pyflakes = false
enable_pylint = false
enable_ruff = true

[completion]
activate_on_typing = true
copilot = false

[experimental]

[keymap]
preset = "vim"

[ai]
rules = ""
[ai.google]

[ai.anthropic]

[ai.open_ai]

[diagnostics]
enabled = false
