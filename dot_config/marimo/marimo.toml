[language_servers.pylsp]
enabled = false
enable_pydocstyle = false
enable_pylint = false
enable_mypy = false
enable_flake8 = false
enable_pyflakes = false
enable_ruff = false

[keymap]
preset = "vim"
[keymap.overrides]

[experimental]

[runtime]
auto_instantiate = false
output_max_bytes = 8000000
on_cell_change = "autorun"
auto_reload = "autorun"
reactive_tests = false
std_stream_max_bytes = 1000000
watcher_on_save = "lazy"

[formatting]
line_length = 94

[diagnostics]
enabled = false

[completion]
activate_on_typing = true
copilot = false

[save]
autosave_delay = 1000
format_on_save = false
autosave = "off"

[ai]
rules = ""
[ai.anthropic]

[ai.google]

[ai.open_ai]

[server]
follow_symlink = false
browser = "default"

[package_management]
manager = "uv"

[snippets]
include_default_snippets = true
custom_paths = []

[display]
code_editor_font_size = 12
dataframes = "rich"
theme = "dark"
default_width = "medium"
cell_output = "below"
default_table_page_size = 10
