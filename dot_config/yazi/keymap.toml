[[mgr.prepend_keymap]]
on = "H"
run = "plugin duckdb -1"
desc = "Scroll one column to the left"

[[mgr.prepend_keymap]]
on = "L"
run = "plugin duckdb +1"
desc = "Scroll one column to the right"

[[mgr.prepend_keymap]]
on = [ "g", "o" ]
run = "plugin duckdb -open"
desc = "open with duckdb"

[[mgr.prepend_keymap]]
on = [ "g", "u" ]
run = "plugin duckdb -ui"
desc = "open with duckdb ui"

[[mgr.prepend_keymap]]
on = "q"
run = "quit --no-cwd-file"
desc = "quit"

[[mgr.prepend_keymap]]
on = "Q"
run = "quit"
desc = "quit and cd"

[[mgr.prepend_keymap]]
on = "?"
run = "help"
desc = "help"
